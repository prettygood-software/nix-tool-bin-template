name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Upstream version to build (e.g. v0.6.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4  # v4.0.0
        with:
          install: true
          cache: true
        env:
          MISE_ENV: ci

      - name: Read tool config
        id: config
        run: |
          echo "name=$(jq -r .name tool.json)" >> "$GITHUB_OUTPUT"
          echo "crate=$(jq -r .crate tool.json)" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: task build:install-cross-tools
        env:
          TARGET: ${{ matrix.target }}

      - name: Compile
        run: task build:compile
        env:
          CRATE: ${{ steps.config.outputs.crate }}
          VERSION: ${{ github.event.inputs.version }}
          TARGET: ${{ matrix.target }}

      - name: Package binary
        run: task build:package
        env:
          TOOL_NAME: ${{ steps.config.outputs.name }}
          TARGET: ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: ${{ steps.config.outputs.name }}-${{ matrix.target }}
          path: |
            *.tar.gz
            *.sha256

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4  # v4.0.0
        with:
          install: true
          cache: true
        env:
          MISE_ENV: ci

      - name: Read tool config
        id: config
        run: echo "name=$(jq -r .name tool.json)" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        run: task build:release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TOOL_NAME: ${{ steps.config.outputs.name }}
          VERSION: ${{ github.event.inputs.version }}
